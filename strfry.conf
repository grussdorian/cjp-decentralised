##
## Bundled strfry relay config for CJP mirror federation.
## Each volunteer mirror runs its own relay; mirrors advertise their relay URL
## in heartbeat events; browsers discover relays from heartbeats and merge them
## into the query pool. Federation grows with volunteer count.
##

db = "/app/strfry-db/"

dbParams {
    maxreaders = 256
    mapsize = 1073741824   # 1 GB cap — plenty for heartbeats + signups
}

events {
    maxEventSize = 65536
    rejectEventsOlderThanSeconds = 94608000   # 3 years
    rejectEventsNewerThanSeconds = 900        # 15 min
    rejectEphemeralEventsOlderThanSeconds = 60
    ephemeralEventsLifetimeSeconds = 300
}

relay {
    bind = "0.0.0.0"
    port = 7777
    nofiles = 0
    realIpHeader = "x-forwarded-for"

    info {
        name = "cjp-mirror"
        description = "Cockroach Janata Party — federated mirror relay. Heartbeats, signups, petitions."
        pubkey = ""
        contact = ""
    }

    maxWebsocketPayloadSize = 131072   # 128 KB
    autoPingSeconds = 55
    enableTcpKeepalive = true
    queryTimesliceBudgetMicroseconds = 10000

    maxFilterLimit = 500
    maxSubsPerConnection = 20

    writePolicy {
        plugin = ""
    }

    compression {
        enabled = true
        slidingWindow = true
    }

    logging {
        dumpInAll = false
        dumpInEvents = false
        dumpInReqs = false
        dbScanPerf = false
    }

    numThreads {
        ingester = 3
        reqWorker = 3
        reqMonitor = 3
        negentropy = 2
    }

    negentropy {
        enabled = true
        maxSyncEvents = 1000000
    }
}
