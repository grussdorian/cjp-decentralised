server {
    listen 80;
    server_name _;

    root /var/cjp/html;
    index index.html;

    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' wss: https:;" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy no-referrer always;

    # Reverse-proxy the bundled strfry relay. Volunteers who set
    # MIRROR_RELAY_URL=wss://<their-host>/relay in docker-compose make this
    # path publicly reachable; the daemon then advertises it in heartbeats.
    location /relay {
        proxy_pass http://relay:7777/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;   # 24h — WebSocket connections stay open
    }

    # Self-hosted IPFS gateway. The bundled kubo node has the current CID
    # always pinned, so /ipfs/<CID> is served instantly without any
    # third-party gateway dependency. /ipns/<name> works too.
    # Requires kubo's Gateway.PublicGateways config to declare this host with
    # UseSubdomains=false (see docker-compose.yml ipfs-init for the snippet).
    location ~ ^/(ipfs|ipns)/ {
        proxy_pass http://ipfs:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Range requests for large files
        proxy_request_buffering off;
        proxy_buffering off;
    }

    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    error_page 404 /404.html;
}
